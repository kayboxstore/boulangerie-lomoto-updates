<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boulangerie Lomoto - Mises a jour</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #f7efe4 0%, #f0d7af 100%);
      color: #3c2415;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    main {
      width: min(680px, calc(100% - 32px));
      background: rgba(255, 255, 255, 0.92);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 18px 50px rgba(60, 36, 21, 0.18);
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    code {
      background: #f5efe8;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Boulangerie Lomoto</h1>
    <p>Ce depot sert a publier le fichier <code>update.json</code> utilise par l'application pour verifier les mises a jour hebdomadaires.</p>
    <p>Si vous voyez cette page, GitHub Pages est bien actif.</p>
  </main>
</body>
</html>
